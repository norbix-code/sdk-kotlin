name: CI

on:
  pull_request:
  push:
    branches: [main, next, beta]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Test
        run: gradle test
      - name: Build
        run: gradle build
